// ── TIMELINE VIEW ────────────────────────────────────────────────────────────
function TimelineView({ timeline, onAdd, onDelete }) {
  const [newEntry, setNewEntry] = useState({ session: '', content: '' });
  function addEntry() {
    if (!newEntry.content) return;
    onAdd({ session: newEntry.session, content: newEntry.content });
    setNewEntry({ session: '', content: '' });
  }
  return (
    <div>
      <div style={{marginBottom: 24}}>
        <div className="field-row">
          <div className="field"><label>Session #</label><input type="text" value={newEntry.session} onChange={e => setNewEntry({...newEntry, session: e.target.value})} placeholder="Session number..." /></div>
        </div>
        <div className="field"><label>Entry</label><textarea value={newEntry.content} onChange={e => setNewEntry({...newEntry, content: e.target.value})} placeholder="What happened? A major event, world reaction, party decision and its consequence..." /></div>
        <button className="btn btn-primary mt-8" onClick={addEntry}>+ Add Entry</button>
      </div>
      {timeline.length === 0 ? (
        <div className="empty-state"><div className="empty-icon">📜</div><h3>The Chronicle Awaits</h3><p>Add your first entry to begin the campaign timeline.</p></div>
      ) : (
        <div className="timeline">
          {[...timeline].reverse().map(entry => (
            <div key={entry.id} className="timeline-entry">
              {entry.session && <div className="timeline-session">SESSION {entry.session}</div>}
              <div className="timeline-content">{entry.content}</div>
              <button className="btn btn-ghost btn-sm" style={{marginTop:6}} onClick={() => onDelete(entry.id)}>Remove</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── GLOBAL TOOLS MODAL ───────────────────────────────────────────────────────
function GlobalToolModal({ tool, onClose }) {
  const [ctx, setCtx] = useState('');
  const [tableSize, setTableSize] = useState('d6');
  const [lootScale, setLootScale] = useState('Moderate');
  const [result, setResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [parsedTable, setParsedTable] = useState(null);

  async function handleYesAnd() {
    if (!ctx) { setError('Describe what just happened first.'); return; }
    setLoading(true); setError(''); setResult('');
    try {
      const sys = `You are a D&D dungeon master improv expert. The DM needs to run with something unexpected that just happened at the table. Apply the "Yes, And" improv principle — commit to the unexpected thing and build forward from it in a way that serves the story and keeps momentum going. Don't redirect back to the original plan. Accept the new reality and make it interesting. Give the DM 2-4 sentences of specific, immediately usable direction.`;
      setResult(await callClaude(sys, `WHAT JUST HAPPENED: ${ctx}`));
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  async function handleRollTable() {
    if (!ctx) { setError('Enter a topic for the table.'); return; }
    setLoading(true); setError(''); setResult(''); setParsedTable(null);
    try {
      const num = parseInt(tableSize.replace('d', ''));
      const sys = `You are a D&D dungeon master assistant. Generate a ${tableSize} random table on the given topic. Return ONLY a JSON array of exactly ${num} strings, one for each result (1 through ${num}). No preamble, no markdown, no explanation. Just the raw JSON array. Example format: ["Result one","Result two","Result three"]`;
      const raw = await callClaude(sys, `TOPIC: ${ctx}\nRETURN ONLY A JSON ARRAY OF ${num} STRINGS.`);
      try {
        const clean = raw.replace(/```json|```/g, '').trim();
        const arr = JSON.parse(clean);
        setParsedTable(arr);
      } catch { setResult(raw); }
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  async function handleLoot() {
    if (!ctx) { setError('Enter context for the loot.'); return; }
    setLoading(true); setError(''); setResult('');
    try {
      const sys = `You are a D&D dungeon master assistant specializing in contextual loot that doubles as worldbuilding. Generate ${lootScale} loot appropriate to the context provided. Make items feel specific and meaningful — not generic fantasy treasure. Include a mix of currency, items, and at least one interesting object with a story behind it. Format clearly and be specific about values, conditions, and notable details.`;
      setResult(await callClaude(sys, `CONTEXT: ${ctx}\nLOOT SCALE: ${lootScale}`));
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  const tableSizes = ['d4','d6','d8','d10','d12'];
  const lootScales = ['Minor','Moderate','Major','Hoard'];

  const titles = { yesand: 'Yes, And...', rolltable: 'Quick Roll Table', loot: 'Loot Generator' };
  const icons = { yesand: '🎭', rolltable: '🎲', loot: '💰' };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{icons[tool]} {titles[tool]}</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {tool === 'yesand' && (
            <>
              <div className="field">
                <label>What just happened? (required)</label>
                <textarea value={ctx} onChange={e => setCtx(e.target.value)} placeholder="A player did something unexpected, the session went off-script, an NPC interaction took on a life of its own..." />
              </div>
              <button className="btn btn-primary btn-lg" onClick={handleYesAnd} disabled={loading}>🎭 Yes, And...</button>
            </>
          )}
          {tool === 'rolltable' && (
            <>
              <div className="field">
                <label>Topic (required)</label>
                <input type="text" value={ctx} onChange={e => setCtx(e.target.value)} placeholder="Tavern rumors, merchant wares, strange weather events, random NPC names..." />
              </div>
              <div className="field">
                <label>Table Size</label>
                <div className="scale-select">
                  {tableSizes.map(s => (
                    <button key={s} className={`scale-btn ${tableSize === s ? 'active-scale' : ''}`} onClick={() => setTableSize(s)}>{s}</button>
                  ))}
                </div>
              </div>
              <button className="btn btn-primary btn-lg" onClick={handleRollTable} disabled={loading}>🎲 Generate Table</button>
              {parsedTable && (
                <div className="roll-table mt-12">
                  {parsedTable.map((item, i) => (
                    <div key={i} className="roll-table-row">
                      <span className="roll-num">{i+1}</span>
                      <span className="roll-text">{item}</span>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
          {tool === 'loot' && (
            <>
              <div className="field">
                <label>Context (required)</label>
                <textarea value={ctx} onChange={e => setCtx(e.target.value)} placeholder="Enemy type, location, danger level, campaign tone, any specific inclusions or exclusions..." />
              </div>
              <div className="field">
                <label>Loot Scale</label>
                <div className="scale-select">
                  {lootScales.map(s => (
                    <button key={s} className={`scale-btn ${lootScale === s ? 'active-scale' : ''}`} onClick={() => setLootScale(s)}>{s}</button>
                  ))}
                </div>
              </div>
              <button className="btn btn-primary btn-lg" onClick={handleLoot} disabled={loading}>💰 Generate Loot</button>
            </>
          )}
          <ClaudePanel result={result} loading={loading} error={error} />
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ data, navigate }) {
  const party = data.party;
  const sessions = data.sessions;
  const lastSession = sessions.length > 0 ? sessions[sessions.length - 1] : null;
  const cardCounts = {
    npcs: data.npcs.length,
    locations: data.locations.length,
    sessions: data.sessions.length,
    scenes: data.scenes.length
  };

  return (
    <div>
      <div className="dashboard-grid">
        <div className="dashboard-banner">
          <h2>{party.campaignName || 'Your Campaign'}</h2>
          <p>{party.partyName ? `The ${party.partyName}` : 'Set up your party card to get started'} {party.level ? `· Level ${party.level}` : ''} {party.currentLocation ? `· ${party.currentLocation}` : ''}</p>
          <div className="dashboard-stats">
            <div className="stat-box">
              <div className="stat-label">Session</div>
              <div className="stat-value">{lastSession?.number || '—'}</div>
              <div className="stat-sub">{lastSession?.date || 'No sessions yet'}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">The One Thing</div>
              <div className="stat-value" style={{fontSize: 13, lineHeight: 1.4, marginTop: 2}}>{lastSession?.oneThing || '—'}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Emotional Target</div>
              <div className="stat-value" style={{fontSize: 13, lineHeight: 1.4, marginTop: 2}}>{lastSession?.emotionalTarget || '—'}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Contingency</div>
              <div className="stat-value" style={{fontSize: 13, lineHeight: 1.4, marginTop: 2}}>{lastSession?.contingency || '—'}</div>
            </div>
          </div>
        </div>

        <div className="quick-access">
          <h3>Quick Access</h3>
          <div className="quick-access-grid">
            {[
              {key:'npcs', label:'NPCs', icon:'👤'},
              {key:'locations', label:'Locations', icon:'🗺'},
              {key:'sessions', label:'Sessions', icon:'📖'},
              {key:'scenes', label:'Scenes', icon:'🎭'},
              {key:'party', label:'Party', icon:'⚔'},
              {key:'world', label:'World', icon:'🌍'},
            ].map(item => (
              <button key={item.key} className="quick-card-btn" onClick={() => navigate(item.key)}>
                <span className="icon">{item.icon}</span>
                {item.label}
                {cardCounts[item.key] !== undefined && <span style={{fontSize:10,color:'var(--text-dim)',display:'block'}}>{cardCounts[item.key]} cards</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="info-row">
        <div className="info-panel">
          <h4>Active Quests</h4>
          {party.quests ? <p>{party.quests}</p> : <p className="empty">No quests logged yet.</p>}
        </div>
        <div className="info-panel">
          <h4>World in Motion</h4>
          {lastSession?.worldMotion ? <p>{lastSession.worldMotion}</p> : <p className="empty">Log world events in your session card.</p>}
        </div>
        <div className="info-panel">
          <h4>Central Conflict</h4>
          {data.world.centralConflict ? <p>{data.world.centralConflict}</p> : <p className="empty">Define the central conflict in the World card.</p>}
        </div>
      </div>

      <div className="info-row">
        <div className="info-panel">
          <h4>Party Assumptions</h4>
          {party.assumptions ? <p>{party.assumptions}</p> : <p className="empty">What does the party think is true?</p>}
        </div>
        <div className="info-panel">
          <h4>What Stalls Them</h4>
          {party.stalls ? <p>{party.stalls}</p> : <p className="empty">Know what kills your table's energy.</p>}
        </div>
        <div className="info-panel">
          <h4>Villain's Clock</h4>
          {data.world.villainClock ? <p>{data.world.villainClock}</p> : <p className="empty">What happens if the party does nothing?</p>}
        </div>
      </div>
    </div>
  );
}


// ── SYNC STATUS INDICATOR ────────────────────────────────────────────────────
function SyncIndicator({ status }) {
  const configs = {
    loading: { color: 'var(--ice-bright)',   icon: '◌', label: 'Loading...' },
    saving:  { color: 'var(--gold)',          icon: '◎', label: 'Saving...' },
    saved:   { color: 'var(--sage-bright)',   icon: '◉', label: 'Synced' },
    error:   { color: 'var(--blood-bright)',  icon: '◈', label: 'Sync error' },
  };
  const c = configs[status] || configs.saved;
  return (
    <div style={{display:'flex', alignItems:'center', gap:6, fontFamily:'var(--font-mono)', fontSize:11, color: c.color}}>
      <span style={{fontSize:14, animation: status==='saving'||status==='loading' ? 'pulse-gold 1s infinite' : 'none'}}>{c.icon}</span>
      {c.label}
    </div>
  );
}

// ── LOADING SCREEN ────────────────────────────────────────────────────────────
function LoadingScreen() {
  return (
    <div style={{display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', flexDirection:'column', gap:20}}>
      <div style={{fontSize:48, animation:'pulse-gold 1.5s ease-in-out infinite'}}>⚔</div>
      <div style={{fontFamily:'var(--font-display)', fontSize:18, color:'var(--gold)', letterSpacing:'0.1em'}}>Consulting the Grimoire...</div>
      <div style={{fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text-dim)'}}>Connecting to Supabase</div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const { data, syncStatus, addCard, updateCard, deleteCard, updateSingle, addTimeline, deleteTimeline } = useData();
  const [view, setView] = useState('dashboard');
  const [activeTool, setActiveTool] = useState(null);
  const [toast, setToast] = useState({ show: false, msg: '' });
  const [partyResult, setPartyResult] = useState({ text: '' });

  function showToast(msg) {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg: '' }), 2500);
  }

  const blankNPC      = () => ({name:'', species:'', age:'', occupation:'', affiliation:'', background:'', physicalDesc:'', conflictStance:'', quests:'', hook:'', voice:'', desire:'', fear:'', secret:'', relationship:'', relationshipNote:'', disposition:'', pressure:'', notes:''});
  const blankLocation = () => ({name:'', type:'', region:'', sight:'', sound:'', smell:'', tone:'', features:'', occupants:'', hidden:'', danger:'', dangerNote:'', rumors:'', notes:''});
  const blankSession  = () => ({number:'', date:'', goals:'', oneThing:'', emotionalTarget:'', contingency:'', partyStatus:'', worldMotion:'', beats:'', lastRecap:'', notes:''});
  const blankScene    = () => ({name:'', location:'', why:'', goal:'', present:'', tension:'', atmosphere:'', pacing:'', pacingNote:'', interactive:'', notes:''});

  async function addNPC()      { await addCard('npcs',      blankNPC());      showToast('New NPC card created'); }
  async function addLocation() { await addCard('locations', blankLocation()); showToast('New location card created'); }
  async function addSession()  { await addCard('sessions',  blankSession());  showToast('New session card created'); }
  async function addScene()    { await addCard('scenes',    blankScene());    showToast('New scene card created'); }

  function updateNPC(id, npc)      { updateCard('npcs',      id, npc); }
  function updateLocation(id, loc) { updateCard('locations', id, loc); }
  function updateSession(id, s)    { updateCard('sessions',  id, s); }
  function updateScene(id, s)      { updateCard('scenes',    id, s); }

  async function deleteNPC(id)      { await deleteCard('npcs',      id); showToast('NPC removed'); }
  async function deleteLocation(id) { await deleteCard('locations', id); showToast('Location removed'); }
  async function deleteSession(id)  { await deleteCard('sessions',  id); showToast('Session removed'); }
  async function deleteScene(id)    { await deleteCard('scenes',    id); showToast('Scene removed'); }

  function updateParty(party) { updateSingle('party',   'party',    party); }
  function updateWorld(world) { updateSingle('world',   'world',    world); }
  function updateDMNotes(n)   { updateSingle('dmNotes', 'dm_notes', n); }

  const navItems  = [{ key:'dashboard', label:'Dashboard', icon:'⚑' }];
  const cardItems = [
    {key:'npcs', label:'NPCs', icon:'👤'},
    {key:'locations', label:'Locations', icon:'🗺'},
    {key:'sessions', label:'Sessions', icon:'📖'},
    {key:'scenes', label:'Scenes', icon:'🎭'},
    {key:'party', label:'Party', icon:'⚔'},
    {key:'world', label:'World', icon:'🌍'},
  ];
  const toolItems = [
    {key:'timeline', label:'Timeline', icon:'📜'},
    {key:'notes', label:'DM Notes', icon:'✏'},
  ];
  const viewTitles = {dashboard:'Dashboard', npcs:'NPCs', locations:'Locations', sessions:'Sessions', scenes:'Scenes', party:'Party', world:'World', timeline:'Campaign Timeline', notes:'DM Notes'};

  if (!data._loaded) return <LoadingScreen />;

  function renderContent() {
    switch(view) {
      case 'dashboard': return <Dashboard data={data} navigate={setView} />;
      case 'npcs':
        return (
          <div className="entity-list">
            {data.npcs.length===0 && <div className="empty-state"><div className="empty-icon">👤</div><h3>No NPCs Yet</h3><p>Create your first NPC card to bring your world to life.</p></div>}
            {data.npcs.map(npc => <NPCCard key={npc.id} npc={npc} onUpdate={n=>updateNPC(npc.id,n)} onDelete={()=>deleteNPC(npc.id)} />)}
            <button className="add-card-btn" onClick={addNPC}>+ New NPC Card</button>
          </div>
        );
      case 'locations':
        return (
          <div className="entity-list">
            {data.locations.length===0 && <div className="empty-state"><div className="empty-icon">🗺</div><h3>No Locations Yet</h3><p>Create your first location card to map your world.</p></div>}
            {data.locations.map(loc => <LocationCard key={loc.id} loc={loc} onUpdate={l=>updateLocation(loc.id,l)} onDelete={()=>deleteLocation(loc.id)} />)}
            <button className="add-card-btn" onClick={addLocation}>+ New Location Card</button>
          </div>
        );
      case 'sessions':
        return (
          <div className="entity-list">
            {data.sessions.length===0 && <div className="empty-state"><div className="empty-icon">📖</div><h3>No Sessions Yet</h3><p>Create your first session card to start prepping.</p></div>}
            {data.sessions.map(s => <SessionCard key={s.id} session={s} onUpdate={x=>updateSession(s.id,x)} onDelete={()=>deleteSession(s.id)} />)}
            <button className="add-card-btn" onClick={addSession}>+ New Session Card</button>
          </div>
        );
      case 'scenes':
        return (
          <div className="entity-list">
            {data.scenes.length===0 && <div className="empty-state"><div className="empty-icon">🎭</div><h3>No Scenes Yet</h3><p>Create your first scene card to prep a moment.</p></div>}
            {data.scenes.map(s => <SceneCard key={s.id} scene={s} onUpdate={x=>updateScene(s.id,x)} onDelete={()=>deleteScene(s.id)} />)}
            <button className="add-card-btn" onClick={addScene}>+ New Scene Card</button>
          </div>
        );
      case 'party':
        return <div style={{maxWidth:820}}><PartyView party={data.party} onUpdate={updateParty} partyResult={partyResult} onSetPartyResult={t => setPartyResult({ text: t })} onClearPartyResult={() => setPartyResult({ text: '' })} /></div>;
      case 'world':
        return <div style={{maxWidth:820}}><WorldView world={data.world} onUpdate={updateWorld} /></div>;
      case 'timeline':
        return <div style={{maxWidth:720}}><TimelineView timeline={data.timeline} onAdd={addTimeline} onDelete={deleteTimeline} /></div>;
      case 'notes':
        return (
          <div style={{maxWidth:820}}>
            <div className="notes-area">
              <textarea value={data.dmNotes||''} onChange={e=>updateDMNotes(e.target.value)} placeholder="Your freeform scratch pad. Mid-session ideas, unexpected threads, future twists — anything that sparks at the table goes here before it disappears..." />
            </div>
          </div>
        );
      default: return null;
    }
  }

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="rune">⚔</div>
          <h1>The Grimoire</h1>
          <p>DM Prep Tool</p>
        </div>
        <div className="sidebar-section">
          {navItems.map(item => (
            <button key={item.key} className={`nav-btn ${view===item.key?'active':''}`} onClick={()=>setView(item.key)}>
              <span className="icon">{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-label">Cards</div>
          {cardItems.map(item => (
            <button key={item.key} className={`nav-btn ${view===item.key?'active':''}`} onClick={()=>setView(item.key)}>
              <span className="icon">{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-label">Reference</div>
          {toolItems.map(item => (
            <button key={item.key} className={`nav-btn ${view===item.key?'active':''}`} onClick={()=>setView(item.key)}>
              <span className="icon">{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
        <div className="sidebar-bottom">
          <div className="sidebar-section-label" style={{paddingLeft:0, marginBottom:8}}>Global Tools</div>
          <button className="global-btn" onClick={()=>setActiveTool('yesand')}>🎭 Yes, And...</button>
          <button className="global-btn" onClick={()=>setActiveTool('rolltable')}>🎲 Roll Table</button>
          <button className="global-btn" onClick={()=>setActiveTool('loot')}>💰 Loot Generator</button>
          <div style={{marginTop:12, paddingTop:10, borderTop:'1px solid var(--border)'}}>
            <SyncIndicator status={syncStatus} />
          </div>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{viewTitles[view]}</div>
            {data.party.campaignName && <div className="topbar-subtitle">{data.party.campaignName} {data.party.level ? `· Level ${data.party.level}` : ''}</div>}
          </div>
          <div className="topbar-actions">
            {view==='npcs'      && <button className="btn btn-primary btn-sm" onClick={addNPC}>+ NPC</button>}
            {view==='locations' && <button className="btn btn-primary btn-sm" onClick={addLocation}>+ Location</button>}
            {view==='sessions'  && <button className="btn btn-primary btn-sm" onClick={addSession}>+ Session</button>}
            {view==='scenes'    && <button className="btn btn-primary btn-sm" onClick={addScene}>+ Scene</button>}
          </div>
        </div>
        <div className="content">{renderContent()}</div>
      </div>

      {activeTool && <GlobalToolModal tool={activeTool} onClose={()=>setActiveTool(null)} />}
      <Toast message={toast.msg} show={toast.show} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
